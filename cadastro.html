<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar Conta — Flora Gestão</title>
<meta name="theme-color" content="#7c3aed">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(135deg,#f5f3ff 0%,#ecfdf5 100%);display:flex;align-items:center;justify-content:center;padding:20px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif}

.card{background:#fff;border-radius:24px;padding:36px 32px 32px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(124,58,237,.12),0 4px 16px rgba(0,0,0,.06)}
.card::-webkit-scrollbar{width:3px}

/* Logo */
.logo-wrap{text-align:center;margin-bottom:28px}
.logo-icon{width:64px;height:64px;background:linear-gradient(135deg,#7c3aed,#059669);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.brand-name{font-size:26px;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,#7c3aed,#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand-sub{font-size:12px;color:#888;letter-spacing:1.5px;text-transform:uppercase;margin-top:4px}

/* Títulos */
.form-title{font-size:18px;font-weight:800;color:#111;text-align:center;margin-bottom:4px}
.form-sub{font-size:12px;color:#888;text-align:center;margin-bottom:22px}

/* Inputs */
.field{position:relative;margin-bottom:12px}
.field-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#aaa;pointer-events:none;display:flex}
.inp{width:100%;padding:12px 12px 12px 40px;border:1.5px solid #e5e5e5;border-radius:12px;font-size:14px;color:#111;outline:none;transition:.2s;font-family:inherit;background:#fafafa}
.inp:focus{border-color:#7c3aed;background:#fff;box-shadow:0 0 0 3px rgba(124,58,237,.1)}
.inp::placeholder{color:#bbb}
.inp-plain{width:100%;padding:12px 14px;border:1.5px solid #e5e5e5;border-radius:12px;font-size:14px;color:#111;outline:none;transition:.2s;font-family:inherit;background:#fafafa}
.inp-plain:focus{border-color:#7c3aed;background:#fff;box-shadow:0 0 0 3px rgba(124,58,237,.1)}

/* Toggle senha */
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:#aaa;padding:0;line-height:1}

/* Grid 2 cols */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Botão */
.btn-main{width:100%;padding:14px;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;border:none;border-radius:13px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.5px;font-family:inherit;margin-top:6px;transition:.15s;position:relative}
.btn-main:hover{background:linear-gradient(135deg,#6d28d9,#5b21b6)}
.btn-main:disabled{opacity:.6;cursor:not-allowed}

/* Alert */
.alert{border-radius:10px;padding:11px 14px;font-size:13px;font-weight:600;margin-bottom:14px;display:none;text-align:center}
.alert.err{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.alert.ok{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.alert.show{display:block}

/* Divisor */
.divider{height:1px;background:#f0f0f0;margin:18px 0}

/* Link entrar */
.link-entrar{text-align:center;font-size:13px;color:#888;margin-top:4px}
.link-entrar a{color:#7c3aed;font-weight:700;text-decoration:none}
.link-entrar a:hover{text-decoration:underline}

/* Label pequeno */
.field-label{font-size:11px;font-weight:700;color:#555;letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:5px}

/* Spinner */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Mobile */
@media(max-width:480px){
  body{padding:16px;align-items:flex-start;padding-top:24px}
  .card{padding:28px 20px 24px}
  .grid2{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="card">

  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg width="34" height="40" viewBox="0 0 100 115" fill="none">
        <path d="M50 62 C50 62 26 53 20 30 C14 8 36 2 50 24 C64 2 86 8 80 30 C74 53 50 62 50 62Z" fill="white" opacity="0.92"/>
        <path d="M50 62 C50 62 36 49 36 30 C36 14 50 5 50 5 C50 5 64 14 64 30 C64 49 50 62 50 62Z" fill="white" opacity="0.6"/>
        <path d="M50 62 L50 102" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
        <path d="M50 85 C50 85 28 80 24 66 C37 66 50 77 50 85Z" fill="white"/>
        <path d="M50 77 C50 77 72 72 76 58 C63 58 50 69 50 77Z" fill="white"/>
      </svg>
    </div>
    <div class="brand-name">FLORA</div>
    <div class="brand-sub">Sistema para salões de beleza</div>
  </div>

  <div class="form-title">Crie sua conta grátis</div>
  <div class="form-sub">7 dias de teste grátis, sem cartão de crédito</div>

  <!-- Alert -->
  <div class="alert" id="alert"></div>

  <!-- Form -->
  <form id="form-cadastro" onsubmit="handleSubmit(event)" novalidate>

    <div class="field">
      <label class="field-label" for="f-salao">Nome do salão</label>
      <span class="field-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </span>
      <input id="f-salao" class="inp" type="text" placeholder="Ex: Studio Flora, Salão da Ana…" autocomplete="organization" required/>
    </div>

    <div class="field">
      <label class="field-label" for="f-resp">Nome do responsável</label>
      <span class="field-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </span>
      <input id="f-resp" class="inp" type="text" placeholder="Seu nome completo" autocomplete="name" required/>
    </div>

    <div class="field">
      <label class="field-label" for="f-email">Email</label>
      <span class="field-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
      </span>
      <input id="f-email" class="inp" type="email" placeholder="seu@email.com" autocomplete="email" required/>
    </div>

    <div class="field">
      <label class="field-label" for="f-tel">Telefone / WhatsApp</label>
      <span class="field-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.63a19.79 19.79 0 01-3.07-8.67A2 2 0 012 .84h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
      </span>
      <input id="f-tel" class="inp" type="tel" placeholder="(11) 99999-9999" autocomplete="tel"/>
    </div>

    <div class="grid2">
      <div class="field" style="margin-bottom:0">
        <label class="field-label" for="f-senha">Senha</label>
        <span class="field-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </span>
        <input id="f-senha" class="inp" type="password" placeholder="Mín. 6 caracteres" autocomplete="new-password" required/>
        <button type="button" class="eye-btn" onclick="toggleVis('f-senha',this)" tabindex="-1">👁</button>
      </div>
      <div class="field" style="margin-bottom:0">
        <label class="field-label" for="f-senha2">Confirmar senha</label>
        <span class="field-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </span>
        <input id="f-senha2" class="inp" type="password" placeholder="Repita a senha" autocomplete="new-password" required/>
        <button type="button" class="eye-btn" onclick="toggleVis('f-senha2',this)" tabindex="-1">👁</button>
      </div>
    </div>

    <div style="height:14px"></div>

    <button class="btn-main" type="submit" id="btn-criar">Criar minha conta →</button>

  </form>

  <div class="divider"></div>

  <div class="link-entrar">
    Já tem conta? <a href="index.html">Entrar →</a>
  </div>

</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL='https://nqwzbpinhkgxfboeursu.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xd3picGluaGtneGZib2V1cnN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNTE2MTMsImV4cCI6MjA5NTcyNzYxM30.ASni8j7rfDxjhWYrDxbwidacJaV51eDzzY7XbdGQCEk';
const supa=supabase.createClient(SUPA_URL,SUPA_KEY);

function val(id){return(document.getElementById(id)||{}).value||'';}

function showAlert(msg,type){
  var el=document.getElementById('alert');
  el.textContent=msg;
  el.className='alert '+type+' show';
}
function hideAlert(){
  document.getElementById('alert').className='alert';
}

function toggleVis(id,btn){
  var inp=document.getElementById(id);
  if(inp.type==='password'){inp.type='text';btn.textContent='🙈';}
  else{inp.type='password';btn.textContent='👁';}
}

async function handleSubmit(e){
  e.preventDefault();
  hideAlert();

  var nomeSalao=val('f-salao').trim();
  var responsavel=val('f-resp').trim();
  var email=val('f-email').trim();
  var tel=val('f-tel').trim();
  var senha=val('f-senha');
  var senha2=val('f-senha2');

  if(!nomeSalao){showAlert('Informe o nome do salão.','err');document.getElementById('f-salao').focus();return;}
  if(!responsavel){showAlert('Informe o nome do responsável.','err');document.getElementById('f-resp').focus();return;}
  if(!email||!email.includes('@')){showAlert('Informe um email válido.','err');document.getElementById('f-email').focus();return;}
  if(senha.length<6){showAlert('A senha precisa ter pelo menos 6 caracteres.','err');document.getElementById('f-senha').focus();return;}
  if(senha!==senha2){showAlert('As senhas não coincidem.','err');document.getElementById('f-senha2').focus();return;}

  var btn=document.getElementById('btn-criar');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>Criando sua conta…';

  try{
    var res=await supa.auth.signUp({
      email:email,
      password:senha,
      options:{data:{nome_salao:nomeSalao,responsavel:responsavel,telefone:tel}}
    });

    if(res.error){
      var em=(res.error.message||'').toLowerCase();
      if(em.includes('already')||em.includes('exists')){
        showAlert('Esse email já está cadastrado. Use "Entrar" ou recupere sua senha.','err');
      }else{
        showAlert('Erro ao criar conta: '+res.error.message,'err');
      }
      btn.disabled=false;
      btn.innerHTML='Criar minha conta →';
      return;
    }

    var user=res.data&&res.data.user;
    var session=res.data&&res.data.session;

    if(!user){
      // Confirmação de email necessária
      showAlert('✅ Conta criada! Verifique seu email para confirmar e depois entre em index.html.','ok');
      btn.disabled=false;
      btn.innerHTML='Criar minha conta →';
      return;
    }

    // Cria registro na tabela saloes
    var salaoData={
      id:user.id,
      nome_salao:nomeSalao,
      responsavel:responsavel,
      email:email,
      telefone:tel||null,
      plano:'trial',
      created_at:new Date().toISOString()
    };

    var ins=await supa.from('saloes').insert([salaoData]);
    if(ins.error){
      // Fallback sem created_at caso a coluna não exista
      await supa.from('saloes').insert([{
        id:user.id,nome_salao:nomeSalao,responsavel:responsavel,
        email:email,telefone:tel||null,plano:'trial'
      }]);
    }

    showAlert('✅ Conta criada com sucesso! Redirecionando…','ok');
    setTimeout(function(){window.location.href='index.html';},1200);

  }catch(err){
    showAlert('Erro inesperado. Tente novamente.','err');
    console.error('cadastro error:',err);
    btn.disabled=false;
    btn.innerHTML='Criar minha conta →';
  }
}
</script>
</body>
</html>
