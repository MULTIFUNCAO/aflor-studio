<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Florescer com Autoridade — Imersão com Ana Flor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/framer-motion@10/dist/framer-motion.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --rosa:    #C4848A;
    --rosa-lt: #EDD5D7;
    --ouro:    #C9A96E;
    --ouro-lt: #EDE0CC;
    --creme:   #FAF7F2;
    --escuro:  #2C2C2C;
    --medio:   #5C5047;
    --claro:   #9C8C80;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--creme);
    color: var(--escuro);
    font-size: 16px;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3, h4 { font-family: 'Cormorant Garamond', serif; line-height: 1.15; color: var(--escuro); }
  .serif-italic { font-style: italic; }
  img { max-width: 100%; display: block; }
  a { text-decoration: none; color: inherit; }

  .container { max-width: 860px; margin: 0 auto; padding: 0 24px; }
  .container-wide { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
  section { padding: 80px 0; }

  .divider { display: flex; align-items: center; gap: 16px; margin: 0 auto 40px; max-width: 200px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--ouro); }
  .divider-diamond { width: 8px; height: 8px; background: var(--ouro); transform: rotate(45deg); flex-shrink: 0; }

  .btn-cta {
    display: inline-block;
    background: linear-gradient(135deg, var(--rosa) 0%, #A8686E 100%);
    color: #fff; font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 600; letter-spacing: .5px;
    padding: 18px 48px; border-radius: 60px; border: none; cursor: pointer;
    box-shadow: 0 8px 28px rgba(196,132,138,.35);
    transition: transform .2s, box-shadow .2s; text-align: center;
  }
  .btn-cta:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(196,132,138,.45); }
  .btn-cta-ouro {
    background: linear-gradient(135deg, var(--ouro) 0%, #A8844C 100%);
    box-shadow: 0 8px 28px rgba(201,169,110,.35);
  }
  .btn-cta-ouro:hover { box-shadow: 0 12px 36px rgba(201,169,110,.45); }

  .tag {
    display: inline-block; font-family: 'DM Sans', sans-serif;
    font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
    color: var(--ouro); border: 1px solid var(--ouro-lt);
    padding: 5px 16px; border-radius: 40px; margin-bottom: 20px;
  }

  /* HERO */
  #hero {
    background: linear-gradient(160deg, #1a0f0f 0%, #2C2C2C 60%, #3a2525 100%);
    min-height: 100vh; display: flex; flex-direction: column;
    position: relative; overflow: hidden; padding: 0;
  }
  #hero::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 70% 40%, rgba(196,132,138,.18) 0%, transparent 65%),
                radial-gradient(ellipse at 10% 80%, rgba(201,169,110,.12) 0%, transparent 55%);
    pointer-events: none;
  }
  .hero-nav {
    position: relative; z-index: 10; padding: 28px 32px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .hero-logo { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: var(--ouro); letter-spacing: .5px; }
  .hero-body { flex: 1; display: flex; align-items: center; position: relative; z-index: 5; }
  .hero-content { max-width: 760px; margin: 0 auto; padding: 40px 32px 80px; text-align: center; }
  .hero-tag { display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; color: var(--ouro); margin-bottom: 28px; }
  .hero-headline { font-family: 'Cormorant Garamond', serif; font-size: clamp(38px, 7vw, 72px); font-weight: 600; color: #FAF7F2; line-height: 1.08; margin-bottom: 24px; }
  .hero-headline em { color: var(--rosa); font-style: italic; }
  .hero-sub { font-size: clamp(15px, 2.5vw, 18px); color: rgba(250,247,242,.65); max-width: 560px; margin: 0 auto 44px; line-height: 1.7; }
  .hero-detalhe { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 32px; }
  .hero-detalhe span { font-size: 12px; color: rgba(250,247,242,.4); letter-spacing: .5px; }
  .hero-detalhe-dot { width: 3px; height: 3px; border-radius: 50%; background: rgba(250,247,242,.25); }
  .hero-scroll { position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 10; opacity: .4; }
  .hero-scroll span { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #fff; }
  .hero-arrow { width: 20px; height: 20px; border-right: 1.5px solid #fff; border-bottom: 1.5px solid #fff; transform: rotate(45deg); animation: bounce .8s ease infinite alternate; }
  @keyframes bounce { from { transform: rotate(45deg) translate(-2px,-2px); } to { transform: rotate(45deg) translate(2px,2px); } }

  /* COMPRA */
  #compra { background: #fff; }
  #compra .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border: 1px solid #EDE0CC; border-radius: 20px; overflow: hidden; margin-top: 48px; }
  .compra-col { padding: 40px 36px; }
  .compra-col:first-child { border-right: 1px solid #EDE0CC; background: #fdf5f5; }
  .compra-col-title { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 24px; }
  .compra-col:first-child .compra-col-title { color: #b09090; }
  .compra-col:last-child .compra-col-title { color: var(--ouro); }
  .compra-item { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; font-size: 14px; color: var(--medio); line-height: 1.55; }
  .compra-item-icon { width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 1px; }
  .icon-cross { background: #f0e0e0; }
  .icon-check { background: var(--ouro-lt); }

  /* DORES */
  #dores { background: linear-gradient(160deg, #1a0f0f 0%, #2C2C2C 100%); position: relative; overflow: hidden; }
  #dores::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 80% 20%, rgba(196,132,138,.15) 0%, transparent 55%); pointer-events: none; }
  #dores .section-title { color: var(--creme); }
  #dores .tag { border-color: rgba(201,169,110,.3); }
  .dores-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-top: 48px; }
  .dor-card { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 16px; padding: 26px 24px; display: flex; gap: 16px; align-items: flex-start; transition: background .2s; }
  .dor-card:hover { background: rgba(255,255,255,.07); }
  .dor-num { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; color: rgba(201,169,110,.3); line-height: 1; flex-shrink: 0; min-width: 32px; }
  .dor-txt { font-size: 14px; color: rgba(250,247,242,.75); line-height: 1.6; padding-top: 6px; }

  /* MECANISMO */
  #mecanismo { background: var(--creme); text-align: center; }
  .mecanismo-quote { max-width: 720px; margin: 0 auto 48px; font-family: 'Cormorant Garamond', serif; font-size: clamp(24px, 4vw, 40px); font-weight: 400; line-height: 1.35; color: var(--escuro); font-style: italic; }
  .mecanismo-quote strong { font-style: normal; font-weight: 600; color: var(--rosa); }
  .pilares-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-top: 56px; }
  .pilar-card { background: #fff; border: 1px solid #EDE0CC; border-radius: 16px; padding: 28px 20px; text-align: center; cursor: default; }
  .pilar-num { font-family: 'Cormorant Garamond', serif; font-size: 42px; font-weight: 300; color: var(--ouro-lt); line-height: 1; margin-bottom: 10px; }
  .pilar-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; color: var(--escuro); margin-bottom: 8px; }
  .pilar-desc { font-size: 12px; color: var(--claro); line-height: 1.6; }

  /* MÓDULOS */
  #modulos { background: #fff; }
  .modulos-dias { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 48px; }
  .dia-bloco { background: var(--creme); border: 1px solid #EDE0CC; border-radius: 20px; overflow: hidden; }
  .dia-header { padding: 20px 28px; border-bottom: 1px solid #EDE0CC; }
  .dia-header-label { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--ouro); margin-bottom: 4px; }
  .dia-header-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: var(--escuro); }
  .modulo-item { padding: 20px 28px; border-bottom: 1px solid rgba(237,224,204,.5); display: flex; gap: 16px; align-items: flex-start; }
  .modulo-item:last-child { border-bottom: none; }
  .modulo-num { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 300; color: var(--ouro-lt); line-height: 1; flex-shrink: 0; min-width: 28px; }
  .modulo-title { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 600; color: var(--escuro); margin-bottom: 4px; }
  .modulo-desc { font-size: 12px; color: var(--claro); line-height: 1.6; }

  /* ASSESSORIA */
  #assessoria { background: linear-gradient(135deg, #F5EDE6 0%, var(--creme) 100%); }
  .assessoria-inner { background: #fff; border-radius: 24px; overflow: hidden; display: grid; grid-template-columns: 1fr 1fr; border: 1px solid #EDE0CC; margin-top: 48px; }
  .assessoria-visual { background: linear-gradient(160deg, var(--rosa) 0%, #9E5F65 100%); padding: 52px 40px; display: flex; flex-direction: column; justify-content: center; }
  .assessoria-visual-title { font-family: 'Cormorant Garamond', serif; font-size: 38px; font-weight: 600; color: #fff; line-height: 1.15; margin-bottom: 16px; }
  .assessoria-visual-sub { font-size: 14px; color: rgba(255,255,255,.75); line-height: 1.7; }
  .assessoria-lista { padding: 52px 44px; }
  .assessoria-item { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 24px; }
  .assessoria-item:last-child { margin-bottom: 0; }
  .assessoria-bullet { width: 32px; height: 32px; border-radius: 50%; background: var(--ouro-lt); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .assessoria-item-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; color: var(--escuro); margin-bottom: 3px; }
  .assessoria-item-desc { font-size: 13px; color: var(--claro); line-height: 1.6; }

  /* GATILHOS */
  #gatilhos { background: #fff; }
  .gatilhos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 48px; }
  .gatilho-card { border-radius: 20px; padding: 36px 28px; text-align: center; }
  .g-autoridade { background: linear-gradient(135deg, #1a0f0f, #2C2C2C); }
  .g-prova { background: var(--creme); border: 1px solid #EDE0CC; }
  .g-escassez { background: linear-gradient(135deg, var(--rosa) 0%, #9E5F65 100%); }
  .gatilho-icon { width: 52px; height: 52px; border-radius: 14px; margin: 0 auto 18px; display: flex; align-items: center; justify-content: center; }
  .g-autoridade .gatilho-icon { background: rgba(255,255,255,.1); }
  .g-prova .gatilho-icon { background: var(--ouro-lt); }
  .g-escassez .gatilho-icon { background: rgba(255,255,255,.18); }
  .gatilho-label { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
  .g-autoridade .gatilho-label { color: var(--ouro); }
  .g-prova .gatilho-label { color: var(--ouro); }
  .g-escassez .gatilho-label { color: rgba(255,255,255,.6); }
  .gatilho-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; margin-bottom: 12px; line-height: 1.2; }
  .g-autoridade .gatilho-title, .g-escassez .gatilho-title { color: #fff; }
  .g-prova .gatilho-title { color: var(--escuro); }
  .gatilho-desc { font-size: 13px; line-height: 1.65; }
  .g-autoridade .gatilho-desc { color: rgba(255,255,255,.6); }
  .g-prova .gatilho-desc { color: var(--claro); }
  .g-escassez .gatilho-desc { color: rgba(255,255,255,.75); }
  .vagas-badge { display: inline-block; background: rgba(255,255,255,.15); color: #fff; font-size: 13px; font-weight: 600; padding: 8px 20px; border-radius: 40px; margin-top: 16px; border: 1px solid rgba(255,255,255,.2); }

  /* CTA FINAL */
  #cta-final { background: linear-gradient(160deg, #1a0f0f 0%, #2C2C2C 60%, #3a1e20 100%); text-align: center; padding: 120px 0; position: relative; overflow: hidden; }
  #cta-final::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 50%, rgba(196,132,138,.2) 0%, transparent 65%); pointer-events: none; }
  .cta-final-quote { font-family: 'Cormorant Garamond', serif; font-size: clamp(22px, 4vw, 40px); font-weight: 400; font-style: italic; color: rgba(250,247,242,.85); max-width: 680px; margin: 0 auto 48px; line-height: 1.4; position: relative; }
  .cta-final-quote::before { content: '\201C'; font-size: 120px; line-height: 0; vertical-align: -0.45em; color: rgba(201,169,110,.15); font-style: normal; position: absolute; left: -24px; top: 24px; }
  .cta-assinatura { font-size: 13px; color: rgba(250,247,242,.35); margin-top: 28px; letter-spacing: .5px; }

  .section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(28px, 5vw, 48px); font-weight: 600; text-align: center; margin-bottom: 12px; }
  .section-sub { text-align: center; font-size: 15px; color: var(--claro); max-width: 520px; margin: 0 auto; line-height: 1.7; }

  footer { background: #1a0f0f; padding: 32px; text-align: center; font-size: 12px; color: rgba(255,255,255,.3); letter-spacing: .5px; }

  @media (max-width: 768px) {
    section { padding: 60px 0; }
    #compra .grid { grid-template-columns: 1fr; }
    .compra-col:first-child { border-right: none; border-bottom: 1px solid #EDE0CC; }
    .dores-grid { grid-template-columns: 1fr; }
    .pilares-grid { grid-template-columns: repeat(2, 1fr); }
    .pilares-grid .pilar-card:last-child { grid-column: 1 / -1; }
    .modulos-dias { grid-template-columns: 1fr; }
    .assessoria-inner { grid-template-columns: 1fr; }
    .assessoria-visual { padding: 36px 28px; }
    .assessoria-lista { padding: 36px 28px; }
    .gatilhos-grid { grid-template-columns: 1fr; }
    .hero-content { padding: 40px 20px 80px; }
    .hero-nav { padding: 20px; }
  }
  @media (max-width: 480px) {
    .pilares-grid { grid-template-columns: 1fr; }
    .pilares-grid .pilar-card:last-child { grid-column: auto; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { motion, useAnimation, useInView } = Motion;
const { useState, useEffect, useRef, useMemo } = React;

// ── Counter hook ──
function useCounter(target, inView, duration = 1300) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    if (!inView) return;
    setVal(0);
    const t0 = performance.now();
    let raf;
    function tick(now) {
      const p = Math.min((now - t0) / duration, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      setVal(Math.round(eased * target));
      if (p < 1) raf = requestAnimationFrame(tick);
    }
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [inView, target]);
  return val;
}

// ── Floating gold particles ──
function FloatingParticles() {
  const pts = useMemo(() =>
    Array.from({ length: 20 }, (_, i) => ({
      id: i,
      left: `${4 + Math.random() * 92}%`,
      top:  `${4 + Math.random() * 92}%`,
      size: 2 + Math.random() * 4,
      dur:  7 + Math.random() * 10,
      del:  Math.random() * 6,
      op:   0.08 + Math.random() * 0.38,
    })), []);
  return (
    <div style={{ position:'absolute', inset:0, overflow:'hidden', pointerEvents:'none', zIndex:4 }}>
      {pts.map(p => (
        <motion.div key={p.id}
          style={{ position:'absolute', left:p.left, top:p.top, width:p.size, height:p.size, borderRadius:'50%', background:`rgba(201,169,110,${p.op})`, boxShadow:`0 0 ${p.size*3}px rgba(201,169,110,0.25)` }}
          animate={{ y:[0,-38,0], opacity:[p.op, Math.min(p.op*2.2,0.9), p.op], scale:[1,1.35,1] }}
          transition={{ duration:p.dur, delay:p.del, repeat:Infinity, ease:'easeInOut' }}
        />
      ))}
    </div>
  );
}

// ── Section-level scroll reveal ──
function SectionReveal({ children, id, className, style }) {
  const ref = useRef();
  const inView = useInView(ref, { once:true, margin:'-50px' });
  return (
    <motion.section id={id} className={className} style={style} ref={ref}
      initial={{ opacity:0, y:44 }}
      animate={inView ? { opacity:1, y:0 } : {}}
      transition={{ duration:0.7, ease:[0.4,0,0.2,1] }}
    >{children}</motion.section>
  );
}

// ── Generic div reveal ──
function Reveal({ children, delay=0, y=36, x=0, className, style }) {
  const ref = useRef();
  const inView = useInView(ref, { once:true, margin:'-40px' });
  return (
    <motion.div ref={ref} className={className} style={style}
      initial={{ opacity:0, y, x }}
      animate={inView ? { opacity:1, y:0, x:0 } : {}}
      transition={{ duration:0.6, delay, ease:[0.4,0,0.2,1] }}
    >{children}</motion.div>
  );
}

// ── Dor card — fade + shake ──
function DorCard({ num, text, index }) {
  const ref = useRef();
  const controls = useAnimation();
  const inView = useInView(ref, { once:true, margin:'-20px' });
  useEffect(() => {
    if (!inView) return;
    (async () => {
      await controls.start({ opacity:1, y:0, transition:{ delay:index*0.1, duration:0.5, ease:[0.4,0,0.2,1] } });
      await controls.start({ x:[0,-7,7,-5,5,-2,2,0], transition:{ duration:0.48, ease:'easeInOut' } });
    })();
  }, [inView]);
  return (
    <motion.div ref={ref} className="dor-card" initial={{ opacity:0, y:22 }} animate={controls}>
      <div className="dor-num">{String(num).padStart(2,'0')}</div>
      <div className="dor-txt">{text}</div>
    </motion.div>
  );
}

// ── Gatilho card with animated counter ──
function GatilhoCard({ type, stat, suffix='', label, title, desc, badge }) {
  const ref = useRef();
  const inView = useInView(ref, { once:true, margin:'-30px' });
  const count = useCounter(stat, inView);
  const statColor = type === 'prova' ? 'var(--ouro)' : '#fff';
  const icons = {
    autoridade: <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#C9A96E" strokeWidth="1.8" strokeLinecap="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>,
    prova:      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#C9A96E" strokeWidth="1.8" strokeLinecap="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>,
    escassez:   <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.9)" strokeWidth="1.8" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
  };
  return (
    <motion.div ref={ref} className={`gatilho-card g-${type}`}
      initial={{ opacity:0, y:30 }}
      animate={inView ? { opacity:1, y:0 } : {}}
      transition={{ duration:0.6, ease:[0.4,0,0.2,1] }}
    >
      <div className="gatilho-icon">{icons[type]}</div>
      <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:'58px', fontWeight:600, color:statColor, lineHeight:1, marginBottom:'4px' }}>
        {count}{suffix}
      </div>
      <div className="gatilho-label">{label}</div>
      <div className="gatilho-title">{title}</div>
      <div className="gatilho-desc">{desc}</div>
      {badge && <div className="vagas-badge">{badge}</div>}
    </motion.div>
  );
}

// ── Pulsing CTA button ──
function PulsingCTA({ href, children, className, style }) {
  return (
    <div style={{ position:'relative', display:'inline-block' }}>
      <motion.div style={{ position:'absolute', inset:'-8px', borderRadius:'68px', border:'1.5px solid rgba(201,169,110,0.45)', pointerEvents:'none' }}
        animate={{ scale:[1,1.12,1], opacity:[0.6,0,0.6] }}
