<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flora Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:#f0f0f0;color:#111;min-height:100vh}

/* ─── AUTH ─── */
#auth-screen{position:fixed;inset:0;background:#0a0a0a;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:18px}
.auth-logo{width:72px;height:72px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:4px}
#auth-screen h1{color:#fff;font-size:20px;font-weight:900;letter-spacing:3px}
#auth-screen p{color:#555;font-size:12px}
#auth-input{background:#161616;border:1px solid #2a2a2a;color:#fff;padding:13px 18px;border-radius:10px;font-size:15px;width:300px;text-align:center;outline:none;letter-spacing:2px}
#auth-input:focus{border-color:#444}
.auth-btn{background:#fff;color:#111;border:none;padding:13px 0;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;width:300px;transition:.15s}
.auth-btn:hover{background:#e5e5e5}
.auth-err{color:#ef4444;font-size:12px;min-height:16px;text-align:center}

/* ─── LAYOUT ─── */
#app{display:none;min-height:100vh}
.topbar{background:#111;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;border-bottom:1px solid #222}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-logo{width:32px;height:32px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.topbar h1{font-size:14px;font-weight:900;color:#fff;letter-spacing:2px}
.topbar-meta{font-size:11px;color:#555}
.topbar-right{display:flex;gap:8px;align-items:center}
.topbar-right span{font-size:11px;color:#555}
.tb-btn{background:#222;color:#ccc;border:none;padding:6px 14px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;transition:.15s}
.tb-btn:hover{background:#333;color:#fff}

.content{padding:24px;max-width:1440px;margin:0 auto}

/* ─── CARDS ─── */
.cards{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px}
@media(max-width:1100px){.cards{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.cards{grid-template-columns:repeat(2,1fr)}}
.card{background:#fff;border-radius:12px;padding:16px 18px;border:1px solid #e8e8e8;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%}
.card.c-gray::before{background:#ccc}
.card.c-green::before{background:#22c55e}
.card.c-yellow::before{background:#f59e0b}
.card.c-red::before{background:#ef4444}
.card.c-blue::before{background:#3b82f6}
.card.c-purple::before{background:#8b5cf6}
.card-label{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.card-val{font-size:26px;font-weight:900;color:#111;line-height:1}
.card.c-green .card-val{color:#16a34a}
.card.c-yellow .card-val{color:#b45309}
.card.c-red .card-val{color:#dc2626}
.card.c-blue .card-val{color:#1d4ed8}
.card.c-purple .card-val{color:#7c3aed}
.card-sub{font-size:10px;color:#bbb;margin-top:4px}

/* ─── SECTION HEADER ─── */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:10px}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.f-btn{padding:6px 14px;border-radius:20px;border:1.5px solid #ddd;background:#fff;font-size:11px;font-weight:700;cursor:pointer;color:#666;transition:.15s}
.f-btn.active{background:#111;color:#fff;border-color:#111}
.f-btn.f-red.active{background:#ef4444;border-color:#ef4444}
.f-btn.f-yellow.active{background:#f59e0b;border-color:#f59e0b;color:#fff}
.f-btn.f-green.active{background:#22c55e;border-color:#22c55e}
.search-inp{padding:7px 14px;border:1.5px solid #ddd;border-radius:20px;font-size:12px;outline:none;width:200px;background:#fff}
.search-inp:focus{border-color:#999}

/* ─── TABLE ─── */
.table-wrap{background:#fff;border-radius:12px;border:1px solid #e8e8e8;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:10px;font-weight:800;color:#999;text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid #f0f0f0;background:#fafafa;white-space:nowrap}
td{padding:13px 14px;font-size:12px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.row-pago td:first-child{border-left:3px solid #22c55e}
tr.row-teste td:first-child{border-left:3px solid #f59e0b}
tr.row-vencido td:first-child{border-left:3px solid #ef4444}
tr.row-bloqueado td:first-child{border-left:3px solid #d1d5db}
tr:hover td{background:#fafafa}

/* ─── BADGES ─── */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px}
.badge-pago{background:#dcfce7;color:#15803d}
.badge-teste{background:#fef9c3;color:#92400e}
.badge-vencido{background:#fee2e2;color:#b91c1c;animation:pulse-red 1.5s infinite}
.badge-bloqueado{background:#f3f4f6;color:#6b7280}
@keyframes pulse-red{0%,100%{opacity:1}50%{opacity:.6}}

/* ─── TEMPO DINÂMICO ─── */
.tempo-ok{color:#16a34a;font-weight:700;font-size:11px}
.tempo-warn{color:#b45309;font-weight:700;font-size:11px}
.tempo-exp{color:#b91c1c;font-weight:800;font-size:11px}
.tempo-sub{color:#aaa;font-size:10px;margin-top:1px}

/* ─── BOTÕES ─── */
.btn-row{display:flex;gap:5px;flex-wrap:wrap}
.btn-sm{padding:5px 11px;border-radius:7px;font-size:10px;font-weight:800;cursor:pointer;border:none;white-space:nowrap;transition:.15s}
.btn-view{background:#f0f0f0;color:#333}.btn-view:hover{background:#e0e0e0}
.btn-block{background:#fee2e2;color:#dc2626}.btn-block:hover{background:#fecaca}
.btn-unblock{background:#dcfce7;color:#16a34a}.btn-unblock:hover{background:#bbf7d0}
.btn-cobrar{background:#111;color:#fff}.btn-cobrar:hover{background:#333}
.btn-apoiar{background:#3b82f6;color:#fff}.btn-apoiar:hover{background:#2563eb}

/* ─── MODAL ─── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:700px;box-shadow:0 24px 80px rgba(0,0,0,.25);margin:auto}
.modal-head{padding:20px 24px 16px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1;border-radius:16px 16px 0 0}
.modal-head h2{font-size:15px;font-weight:900;display:flex;align-items:center;gap:8px}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:#aaa;line-height:1;padding:0 4px}
.modal-body{padding:22px 24px 28px}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.di .dl{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;margin-bottom:3px}
.di .dv{font-size:13px;font-weight:600;color:#111}
.sec-title{font-size:10px;font-weight:800;color:#aaa;text-transform:uppercase;letter-spacing:.6px;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid #f0f0f0}
.week-bars{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;align-items:flex-end;height:60px;margin-bottom:4px}
.wbar-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;height:100%;justify-content:flex-end}
.wbar{width:100%;border-radius:3px 3px 0 0;min-height:2px;background:#e5e5e5;transition:.3s}
.wbar.active-bar{background:#111}
.wbar-lbl{font-size:8px;color:#bbb;text-align:center;white-space:nowrap}
.wbar-val{font-size:9px;font-weight:700;color:#555;text-align:center}
.top-svc{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f8f8f8;font-size:12px}
.top-svc:last-child{border-bottom:none}
.top-svc-bar{height:3px;background:#f0f0f0;border-radius:2px;margin-top:3px;overflow:hidden}
.top-svc-fill{height:100%;background:#111;border-radius:2px}
.plan-sel{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;margin-bottom:10px;outline:none;background:#fff}
.plan-sel:focus{border-color:#999}
.btn-primary{background:#111;color:#fff;border:none;padding:11px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;width:100%;transition:.15s}
.btn-primary:hover{background:#222}
.info-box{background:#f8f8f8;border-radius:10px;padding:14px 16px;margin-bottom:14px;font-size:12px;color:#555;line-height:1.6}

/* ─── LOADING / EMPTY ─── */
.loading-row td,.empty-row td{text-align:center;padding:40px;color:#bbb;font-size:13px}
.spin{display:inline-block;width:16px;height:16px;border:2px solid #ddd;border-top-color:#111;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-logo">
    <svg width="34" height="40" viewBox="0 0 100 115" fill="none">
      <path d="M50 62 C50 62 26 53 20 30 C14 8 36 2 50 24 C64 2 86 8 80 30 C74 53 50 62 50 62Z" fill="#111" opacity=".9"/>
      <path d="M50 62 C50 62 36 49 36 30 C36 14 50 5 50 5 C50 5 64 14 64 30 C64 49 50 62 50 62Z" fill="#111" opacity=".5"/>
      <path d="M50 62 L50 102" stroke="#111" stroke-width="6" stroke-linecap="round"/>
      <path d="M50 85 C50 85 28 80 24 66 C37 66 50 77 50 85Z" fill="#111"/>
      <path d="M50 77 C50 77 72 72 76 58 C63 58 50 69 50 77Z" fill="#111"/>
    </svg>
  </div>
  <h1>FLORA ADMIN</h1>
  <p>Acesso restrito à equipe Flora Gestão</p>
  <input type="password" id="auth-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkAuth()"/>
  <div class="auth-err" id="auth-err"></div>
  <button class="auth-btn" onclick="checkAuth()">Acessar Painel</button>
</div>

<!-- APP -->
<div id="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">
        <svg width="18" height="22" viewBox="0 0 100 115" fill="none">
          <path d="M50 62 C50 62 26 53 20 30 C14 8 36 2 50 24 C64 2 86 8 80 30 C74 53 50 62 50 62Z" fill="#111"/>
          <path d="M50 62 L50 102" stroke="#111" stroke-width="7" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>FLORA ADMIN</h1>
      <span class="topbar-meta" id="top-meta">carregando...</span>
    </div>
    <div class="topbar-right">
      <span id="top-updated"></span>
      <button class="tb-btn" onclick="loadData()">↻ Atualizar</button>
      <button class="tb-btn" onclick="sair()">Sair</button>
    </div>
  </div>

  <div class="content">
    <!-- CARDS -->
    <div class="cards" id="cards-area">
      <div class="card c-gray"><div class="card-label">Carregando</div><div class="card-val"><span class="spin"></span></div></div>
    </div>

    <!-- FILTROS -->
    <div class="section-head">
      <div class="filters">
        <button class="f-btn active" onclick="setFiltro('todos',this)">Todos</button>
        <button class="f-btn f-green" onclick="setFiltro('pagos',this)">✓ Pagos</button>
        <button class="f-btn f-yellow" onclick="setFiltro('teste',this)">⏳ Em Teste</button>
        <button class="f-btn f-red" onclick="setFiltro('vencido',this)">🔴 Vencidos</button>
        <button class="f-btn" onclick="setFiltro('bloqueado',this)">🚫 Bloqueados</button>
      </div>
      <input class="search-inp" id="busca" placeholder="🔍 Buscar salão ou email..." oninput="renderTabela()"/>
    </div>

    <!-- TABELA -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Salão / Email</th>
            <th>Status</th>
            <th>Plano</th>
            <th>Entrada</th>
            <th>Situação</th>
            <th>Último Acesso</th>
            <th>Agend.</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr class="loading-row"><td colspan="8"><span class="spin"></span>Carregando salões...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODAL DETALHES -->
<div class="modal-bg" id="modal" onclick="if(event.target===this)fecharModal()">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modal-title">Detalhes</h2>
      <button class="modal-close" onclick="fecharModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const SUPA_URL='https://nqwzbpinhkgxfboeursu.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xd3picGluaGtneGZib2V1cnN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNTE2MTMsImV4cCI6MjA5NTcyNzYxM30.ASni8j7rfDxjhWYrDxbwidacJaV51eDzzY7XbdGQCEk';
const PASS='flora2026';
const PLANO_PRECO={'trial':0,'inicial':97,'profissional':197,'flora_total':397,'flora-total':397};
const PLANO_LABEL={'trial':'Trial','inicial':'Inicial','profissional':'Profissional','flora_total':'Flora Total','flora-total':'Flora Total'};

let supa,saloes=[],counts={agend:{},clientes:{},colabs:{},hoje:0},filtro='todos';

// ─── AUTH ───
function checkAuth(){
  var v=document.getElementById('auth-input').value;
  if(v!==PASS){
    document.getElementById('auth-err').textContent='Senha incorreta';
    setTimeout(function(){document.getElementById('auth-err').textContent='';},2500);
    return;
  }
  try{supa=window.supabase.createClient(SUPA_URL,SUPA_KEY);}
  catch(e){alert('Erro ao conectar com Supabase: '+e.message);return;}
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='block';
  loadData();
}
function sair(){
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('auth-input').value='';
  saloes=[];
}

// ─── STATUS ───
function getStatus(s){
  if(s.bloqueado)return 'bloqueado';
  var p=(s.plano||'trial').toLowerCase().replace('-','_');
  if(p!=='trial'&&p!=='')return 'pago';
  // trial: calcular dias
  if(!s.created_at)return 'trial_sem_data';
  var dias=Math.floor((Date.now()-new Date(s.created_at).getTime())/86400000);
  return dias<=14?'teste':'vencido';
}

function getDias(s){
  if(!s.created_at)return null;
  return Math.floor((Date.now()-new Date(s.created_at).getTime())/86400000);
}

function badge(st){
  if(st==='pago')return '<span class="badge badge-pago">● Pago</span>';
  if(st==='teste')return '<span class="badge badge-teste">⏳ Em Teste</span>';
  if(st==='vencido')return '<span class="badge badge-vencido">🔴 Vencido</span>';
  if(st==='bloqueado')return '<span class="badge badge-bloqueado">🚫 Bloqueado</span>';
  return '<span class="badge badge-teste">⏳ Trial</span>';
}

function tempoHtml(s){
  var st=getStatus(s);
  var dias=getDias(s);
  if(st==='pago'){
    return '<div class="tempo-ok">Plano ativo</div>'
      +(s.plano_inicio?'<div class="tempo-sub">desde '+fmtDate(s.plano_inicio)+'</div>':'');
  }
  if(st==='bloqueado') return '<div style="color:#9ca3af;font-size:11px">Acesso bloqueado</div>';
  if(dias===null) return '<div class="tempo-warn">Trial (sem data)</div>';
  if(st==='teste'){
    var restam=14-dias;
    return '<div class="tempo-warn">Restam '+(restam<=0?0:restam)+' dia'+(restam===1?'':'s')+'</div>'
      +'<div class="tempo-sub">cadastrado há '+dias+' dias</div>';
  }
  if(st==='vencido'){
    var exp=dias-14;
    return '<div class="tempo-exp">Expirado há '+exp+' dia'+(exp===1?'':'s')+'!</div>'
      +'<div class="tempo-sub">cadastrado há '+dias+' dias</div>';
  }
  return '<div class="tempo-sub">'+dias+' dias</div>';
}

function rowClass(st){
  if(st==='pago')return 'row-pago';
  if(st==='teste')return 'row-teste';
  if(st==='vencido')return 'row-vencido';
  return 'row-bloqueado';
}

// ─── FORMATTERS ───
function fmtDate(d){
  if(!d)return '—';
  var dt=new Date(d);
  return dt.toLocaleDateString('pt-BR');
}
function fmtMoeda(v){
  return 'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2});
}
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ─── LOAD ───
async function loadData(){
  document.getElementById('cards-area').innerHTML='<div class="card c-gray"><div class="card-label">Carregando</div><div class="card-val"><span class="spin"></span></div></div>';
  document.getElementById('tbody').innerHTML='<tr class="loading-row"><td colspan="8"><span class="spin"></span>Buscando salões...</td></tr>';

  try{
    var [rs,ra,rc,rco,rhoje]=await Promise.all([
      supa.from('saloes').select('*').order('nome_salao',{ascending:true}),
      supa.from('agendamentos').select('salao_id'),
      supa.from('clientes').select('salao_id'),
      supa.from('colaboradores').select('salao_id'),
      supa.from('agendamentos').select('salao_id').eq('data',new Date().toISOString().slice(0,10))
    ]);

    if(rs.error)throw rs.error;
    saloes=rs.data||[];

    counts={agend:{},clientes:{},colabs:{},hoje:(rhoje.data||[]).length};
    (ra.data||[]).forEach(function(r){counts.agend[r.salao_id]=(counts.agend[r.salao_id]||0)+1;});
    (rc.data||[]).forEach(function(r){counts.clientes[r.salao_id]=(counts.clientes[r.salao_id]||0)+1;});
    (rco.data||[]).forEach(function(r){counts.colabs[r.salao_id]=(counts.colabs[r.salao_id]||0)+1;});

    renderCards();
    renderTabela();

    document.getElementById('top-meta').textContent=saloes.length+' salões carregados';
    document.getElementById('top-updated').textContent='Atualizado às '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

  }catch(e){
    document.getElementById('tbody').innerHTML='<tr class="empty-row"><td colspan="8">Erro: '+esc(e.message)+'</td></tr>';
    console.error(e);
  }
}

// ─── CARDS ───
function renderCards(){
  var pagos=saloes.filter(function(s){return getStatus(s)==='pago';});
  var teste=saloes.filter(function(s){return getStatus(s)==='teste';});
  var vencido=saloes.filter(function(s){return getStatus(s)==='vencido';});
  var mrr=pagos.reduce(function(t,s){return t+(PLANO_PRECO[(s.plano||'trial').toLowerCase().replace('-','_')]||0);},0);

  document.getElementById('cards-area').innerHTML=
    kpi('Total Cadastrados',saloes.length,'c-gray','todos os salões')
    +kpi('Planos Pagos',pagos.length,'c-green','ativos')
    +kpi('Em Teste',teste.length,'c-yellow','≤ 14 dias')
    +kpi('Trial Vencido',vencido.length,'c-red','> 14 dias sem pagar')
    +kpi('Agend. Hoje',counts.hoje,'c-blue','toda a plataforma')
    +kpi('Faturamento Est.',fmtMoeda(mrr),'c-purple','MRR planos ativos');
}
function kpi(l,v,c,s){
  return '<div class="card '+c+'"><div class="card-label">'+l+'</div><div class="card-val">'+v+'</div><div class="card-sub">'+s+'</div></div>';
}

// ─── FILTRO ───
function setFiltro(f,el){
  filtro=f;
  document.querySelectorAll('.f-btn').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  renderTabela();
}

// ─── TABELA ───
function renderTabela(){
  var busca=(document.getElementById('busca').value||'').toLowerCase().trim();
  var lista=saloes.filter(function(s){
    var st=getStatus(s);
    if(filtro==='pagos'&&st!=='pago')return false;
    if(filtro==='teste'&&st!=='teste')return false;
    if(filtro==='vencido'&&st!=='vencido')return false;
    if(filtro==='bloqueado'&&st!=='bloqueado')return false;
    if(busca&&!(s.nome_salao||'').toLowerCase().includes(busca)&&!(s.email||'').toLowerCase().includes(busca))return false;
    return true;
  });

  if(!lista.length){
    document.getElementById('tbody').innerHTML='<tr class="empty-row"><td colspan="8">Nenhum salão encontrado</td></tr>';
    return;
  }

  document.getElementById('tbody').innerHTML=lista.map(function(s){
    var st=getStatus(s);
    var plano=(s.plano||'trial').toLowerCase().replace('-','_');
    var planoLbl=PLANO_LABEL[plano]||s.plano||'Trial';
    var dias=getDias(s);
    var tel=limparTel(s.telefone||'');

    var btns='<div class="btn-row">'
      +'<button class="btn-sm btn-view" onclick="verDetalhes(\''+esc(s.id)+'\')">Ver</button>';

    if(st==='vencido'){
      var msgCobrar=encodeURIComponent('Olá, '+(s.responsavel||s.nome_salao||'')+'! 👋 Aqui é da equipe Flora Gestão. Seu período de teste gratuito encerrou há '+(dias-14)+' dia(s). Para continuar usando todas as funcionalidades, basta escolher um dos nossos planos. Posso te ajudar a escolher o melhor para o seu salão?');
      btns+='<button class="btn-sm btn-cobrar" onclick="abrirWpp(\''+tel+'\',\''+msgCobrar+'\')">💰 Cobrar WhatsApp</button>';
    } else if(st==='teste'){
      var msgApoiar=encodeURIComponent('Olá, '+(s.responsavel||s.nome_salao||'')+'! 🌷 Seja bem-vindo(a) ao Flora Gestão! Você ainda tem '+(14-(dias||0))+' dias gratuitos pela frente. Estamos aqui para ajudar com qualquer dúvida durante o teste. Como está sendo a experiência até agora?');
      btns+='<button class="btn-sm btn-apoiar" onclick="abrirWpp(\''+tel+'\',\''+msgApoiar+'\')">💬 Apoiar Cliente</button>';
    }

    if(s.bloqueado){
      btns+='<button class="btn-sm btn-unblock" onclick="toggleBloqueio(\''+esc(s.id)+'\',false,\''+esc(s.nome_salao||'')+'\')">✓ Desbloquear</button>';
    } else {
      btns+='<button class="btn-sm btn-block" onclick="toggleBloqueio(\''+esc(s.id)+'\',true,\''+esc(s.nome_salao||'')+'\')">🚫 Bloquear</button>';
    }

    btns+='</div>';

    return '<tr class="'+rowClass(st)+'">'
      +'<td><div style="font-weight:700;font-size:13px;color:#111">'+esc(s.nome_salao||'—')+'</div>'
      +'<div style="font-size:10px;color:#aaa;margin-top:1px">'+esc(s.email||s.id)+'</div></td>'
      +'<td>'+badge(st)+'</td>'
      +'<td style="font-weight:700;font-size:11px;color:#555">'+planoLbl+'</td>'
      +'<td style="font-size:11px;color:#888">'+fmtDate(s.created_at)+'</td>'
      +'<td>'+tempoHtml(s)+'</td>'
      +'<td style="font-size:11px;color:#aaa">'+fmtDate(s.ultimo_acesso||null)+'</td>'
      +'<td style="font-size:13px;font-weight:700;text-align:center">'+(counts.agend[s.id]||0)+'</td>'
      +'<td>'+btns+'</td>'
      +'</tr>';
  }).join('');
}

// ─── DETALHES ───
async function verDetalhes(id){
  var s=saloes.find(function(x){return x.id===id;});
  if(!s)return;
  var st=getStatus(s);
  var plano=(s.plano||'trial').toLowerCase().replace('-','_');
  document.getElementById('modal-title').innerHTML=esc(s.nome_salao||'Salão')+' '+badge(st);
  document.getElementById('modal-body').innerHTML='<div class="loading-row" style="padding:30px;text-align:center;color:#bbb"><span class="spin"></span>Carregando...</div>';
  document.getElementById('modal').classList.add('open');

  var hoje8=new Date();hoje8.setDate(hoje8.getDate()-55);
  var [rh,rsvcs]=await Promise.all([
    supa.from('agendamentos').select('data').eq('salao_id',id).gte('data',hoje8.toISOString().slice(0,10)),
    supa.from('agendamentos').select('servico').eq('salao_id',id).order('data',{ascending:false}).limit(300)
  ]);

  // Semanas (8 semanas)
  var semanas=[];
  var hj=new Date();
  for(var w=7;w>=0;w--){
    var ini=new Date(hj);ini.setDate(hj.getDate()-w*7-6);
    var fim=new Date(hj);fim.setDate(hj.getDate()-w*7);
    var iniStr=ini.toISOString().slice(0,10),fimStr=fim.toISOString().slice(0,10);
    var q=(rh.data||[]).filter(function(a){return a.data>=iniStr&&a.data<=fimStr;}).length;
    semanas.push({lbl:ini.getDate()+'/'+(ini.getMonth()+1),qtd:q});
  }
  var maxW=Math.max.apply(null,semanas.map(function(x){return x.qtd;}));

  // Top serviços
  var svcMap={};
  (rsvcs.data||[]).forEach(function(a){if(a.servico){svcMap[a.servico]=(svcMap[a.servico]||0)+1;}});
  var topSvcs=Object.keys(svcMap).sort(function(a,b){return svcMap[b]-svcMap[a];}).slice(0,5);
  var maxSvc=topSvcs.length?svcMap[topSvcs[0]]:1;

  var tel=limparTel(s.telefone||'');
  var dias=getDias(s);
  var html='';

  // Info
  html+='<div class="dg">'
    +'<div class="di"><div class="dl">Email</div><div class="dv">'+esc(s.email||'—')+'</div></div>'
    +'<div class="di"><div class="dl">Responsável</div><div class="dv">'+esc(s.responsavel||'—')+'</div></div>'
    +'<div class="di"><div class="dl">Telefone</div><div class="dv">'+esc(s.telefone||'—')+'</div></div>'
    +'<div class="di"><div class="dl">Plano</div><div class="dv">'+(PLANO_LABEL[plano]||s.plano||'Trial')+'</div></div>'
    +'<div class="di"><div class="dl">Data de Entrada</div><div class="dv">'+fmtDate(s.created_at)+(dias!==null?' ('+dias+'d)':'')+'</div></div>'
    +'<div class="di"><div class="dl">Início do Plano</div><div class="dv">'+fmtDate(s.plano_inicio)+'</div></div>'
    +'</div>';

  // Situação
  if(st==='vencido'){
    html+='<div class="info-box" style="background:#fff5f5;border:1px solid #fecaca;color:#b91c1c">'
      +'🔴 <strong>Trial Vencido há '+(dias-14)+' dias.</strong> Este salão não realizou o pagamento após o teste. Considere entrar em contato para conversão.'
      +'</div>';
  } else if(st==='teste'){
    html+='<div class="info-box" style="background:#fefce8;border:1px solid #fde68a;color:#92400e">'
      +'⏳ <strong>Em período de teste.</strong> Restam '+(14-(dias||0))+' dias. Boa hora para apoiar e apresentar os planos.'
      +'</div>';
  }

  // Métricas
  html+='<div class="dg" style="margin-bottom:0">'
    +'<div class="di"><div class="dl">Agendamentos</div><div class="dv" style="font-size:24px;font-weight:900">'+(counts.agend[id]||0)+'</div></div>'
    +'<div class="di"><div class="dl">Clientes</div><div class="dv" style="font-size:24px;font-weight:900">'+(counts.clientes[id]||0)+'</div></div>'
    +'<div class="di"><div class="dl">Colaboradores</div><div class="dv" style="font-size:24px;font-weight:900">'+(counts.colabs[id]||0)+'</div></div>'
    +'<div class="di"><div class="dl">MRR</div><div class="dv" style="font-size:24px;font-weight:900">'+fmtMoeda(PLANO_PRECO[plano]||0)+'</div></div>'
    +'</div>';

  // Barras semanais
  html+='<div class="sec-title">Atendimentos — últimas 8 semanas</div>';
  html+='<div class="week-bars">';
  semanas.forEach(function(w){
    var h=maxW>0?Math.round((w.qtd/maxW)*52):2;
    html+='<div class="wbar-wrap">'
      +'<div class="wbar-val">'+w.qtd+'</div>'
      +'<div class="wbar'+(w.qtd>0?' active-bar':'')+'" style="height:'+(h||2)+'px"></div>'
      +'<div class="wbar-lbl">'+w.lbl+'</div>'
      +'</div>';
  });
  html+='</div>';

  // Top serviços
  if(topSvcs.length){
    html+='<div class="sec-title">Serviços mais agendados</div>';
    topSvcs.forEach(function(sv){
      var pct=Math.round(svcMap[sv]/maxSvc*100);
      html+='<div class="top-svc"><div style="flex:1">'
        +'<div style="display:flex;justify-content:space-between"><span>'+esc(sv)+'</span><span style="font-weight:700">'+svcMap[sv]+'</span></div>'
        +'<div class="top-svc-bar"><div class="top-svc-fill" style="width:'+pct+'%"></div></div>'
        +'</div></div>';
    });
  }

  // Alterar plano
  html+='<div class="sec-title">Alterar Plano</div>';
  html+='<select class="plan-sel" id="sel-plano">'
    +'<option value="trial"'+(plano==='trial'?' selected':'')+'>Trial — R$ 0</option>'
    +'<option value="inicial"'+(plano==='inicial'?' selected':'')+'>Inicial — R$ 97/mês</option>'
    +'<option value="profissional"'+(plano==='profissional'?' selected':'')+'>Profissional — R$ 197/mês</option>'
    +'<option value="flora_total"'+(plano==='flora_total'?' selected':'')+'>Flora Total — R$ 397/mês</option>'
    +'</select>';
  html+='<button class="btn-primary" onclick="salvarPlano(\''+esc(id)+'\')">Salvar Alteração de Plano</button>';

  // Ações rápidas WhatsApp
  if(tel){
    html+='<div class="sec-title">Contato Rápido</div>';
    if(st==='vencido'){
      var mc=encodeURIComponent('Olá, '+(s.responsavel||s.nome_salao||'')+'! 👋 Seu período de teste do Flora Gestão encerrou. Que tal garantir seu plano hoje? Posso te ajudar a escolher o ideal para o seu salão!');
      html+='<button class="btn-sm btn-cobrar" style="width:100%;padding:10px;font-size:12px;margin-bottom:6px" onclick="abrirWpp(\''+tel+'\',\''+mc+'\')">💰 Enviar mensagem de cobrança no WhatsApp</button>';
    }
    var mg=encodeURIComponent('Olá, '+(s.responsavel||s.nome_salao||'')+'! 🌷 Aqui é da equipe Flora Gestão. Estamos à disposição para ajudar com qualquer dúvida. Como podemos te apoiar?');
    html+='<button class="btn-sm btn-apoiar" style="width:100%;padding:10px;font-size:12px" onclick="abrirWpp(\''+tel+'\',\''+mg+'\')">💬 Enviar mensagem de suporte no WhatsApp</button>';
  }

  document.getElementById('modal-body').innerHTML=html;
}

// ─── AÇÕES ───
async function salvarPlano(id){
  var novo=document.getElementById('sel-plano').value;
  var agora=new Date().toISOString().slice(0,10);
  try{
    var up={plano:novo};
    if(novo!=='trial')up.plano_inicio=agora;
    var r=await supa.from('saloes').update(up).eq('id',id);
    if(r.error)throw r.error;
    var s=saloes.find(function(x){return x.id===id;});
    if(s){s.plano=novo;if(novo!=='trial')s.plano_inicio=agora;}
    fecharModal();renderCards();renderTabela();
    alert('Plano atualizado: '+(PLANO_LABEL[novo]||novo));
  }catch(e){alert('Erro: '+e.message);}
}

async function toggleBloqueio(id,bloquear,nome){
  var msg=bloquear?('Bloquear o salão "'+nome+'"?\nO acesso será suspenso imediatamente.')
                  :('Desbloquear o salão "'+nome+'"?');
  if(!confirm(msg))return;
  try{
    var r=await supa.from('saloes').update({bloqueado:bloquear}).eq('id',id);
    if(r.error)throw r.error;
    var s=saloes.find(function(x){return x.id===id;});
    if(s)s.bloqueado=bloquear;
    renderCards();renderTabela();
  }catch(e){alert('Erro: '+e.message);}
}

function abrirWpp(tel,msg){
  var url=tel?'https://wa.me/55'+tel.replace(/\D/g,'')+'?text='+msg:'https://wa.me/?text='+msg;
  window.open(url,'_blank');
}

function limparTel(t){return(t||'').replace(/\D/g,'');}

function fecharModal(){document.getElementById('modal').classList.remove('open');}
document.addEventListener('keydown',function(e){if(e.key==='Escape')fecharModal();});
</script>
